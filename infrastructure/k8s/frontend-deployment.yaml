apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspire-endo-frontend
  namespace: aspire-endo
  labels:
    app: aspire-endo-frontend
    app.kubernetes.io/part-of: aspire-endoexpertise
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aspire-endo-frontend
  template:
    metadata:
      labels:
        app: aspire-endo-frontend
    spec:
      containers:
        - name: frontend
          image: aspireendoacr.azurecr.io/aspire-endo-frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.endoexpertise.aspire.org"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
