apiVersion: v1
kind: ConfigMap
metadata:
  name: aspire-endo-config
  namespace: aspire-endo
  labels:
    app.kubernetes.io/part-of: aspire-endoexpertise
data:
  NODE_ENV: "production"
  FHIR_SERVER_URL: "http://fhir-server.aspire-endo.svc.cluster.local:8080/fhir"
  REDIS_HOST: "redis.aspire-endo.svc.cluster.local"
  REDIS_PORT: "6379"
  ELASTICSEARCH_URL: "http://elasticsearch.aspire-endo.svc.cluster.local:9200"
  DATABASE_HOST: "postgres.aspire-endo.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "aspire_endo"
  LOG_LEVEL: "info"
  CORS_ORIGIN: "https://endoexpertise.aspire.org"
