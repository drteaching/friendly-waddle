apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspire-endo-backend
  namespace: aspire-endo
  labels:
    app: aspire-endo-backend
    app.kubernetes.io/part-of: aspire-endoexpertise
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aspire-endo-backend
  template:
    metadata:
      labels:
        app: aspire-endo-backend
    spec:
      containers:
        - name: backend
          image: aspireendoacr.azurecr.io/aspire-endo-backend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aspire-endo-config
            - secretRef:
                name: aspire-endo-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      restartPolicy: Always
